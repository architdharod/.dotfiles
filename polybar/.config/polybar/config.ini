[colors]
bg         = #1a1b26
bg-alt     = #292e42
fg         = #c0caf5
fg-dim     = #565f89
blue       = #7aa2f7
cyan       = #7dcfff
green      = #9ece6a
yellow     = #e0af68
orange     = #ff9e64
red        = #f7768e
purple     = #bb9af7

[bar/main]
width  = 100%
height = 28
radius = 0

background = ${colors.bg}
foreground = ${colors.fg}

border-size  = 0
line-size    = 2
padding-left = 1
padding-right = 1
module-margin = 1

font-0 = JetBrainsMono Nerd Font:style=Regular:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=10;2

modules-left   = i3
modules-center = xwindow
modules-right  = cpu memory pulseaudio network date tray

wm-restack = i3
override-redirect = false

tray-position = right
tray-padding  = 4
tray-background = ${colors.bg}

cursor-click  = pointer
cursor-scroll = ns-resize

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent    = true
strip-wsnumbers = true
index-sort = true

label-focused            = %index%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.bg-alt}
label-focused-underline  = ${colors.blue}
label-focused-padding    = 2

label-unfocused         = %index%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.fg-dim}

label-urgent            = %index%!
label-urgent-foreground = ${colors.red}
label-urgent-padding    = 2

[module/xwindow]
type             = internal/xwindow
label            = %title:0:60:...%
label-foreground = ${colors.fg-dim}

[module/cpu]
type             = internal/cpu
interval         = 2
format-prefix    = " "
format-prefix-foreground = ${colors.blue}
label            = %percentage:2%%

[module/memory]
type             = internal/memory
interval         = 3
format-prefix    = " "
format-prefix-foreground = ${colors.cyan}
label            = %percentage_used:2%%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

format-volume-prefix    = "󰕾 "
format-volume-prefix-foreground = ${colors.green}
format-volume           = <label-volume>
label-volume            = %percentage%%

label-muted             = "󰖁 muted"
label-muted-foreground  = ${colors.fg-dim}

click-right = pavucontrol &

[module/network]
type = internal/network
# Change to your interface if auto-detect doesn't work (ip link to find it)
interface-type = wireless
interval       = 3

format-connected-prefix    = "󰈀 "
format-connected-prefix-foreground = ${colors.yellow}
label-connected            = %downspeed:6%

format-disconnected-prefix = "󰈂 "
format-disconnected-prefix-foreground = ${colors.fg-dim}
label-disconnected         = "disconnected"
label-disconnected-foreground = ${colors.fg-dim}

[module/date]
type     = internal/date
interval = 1

date       = "%a %d %b"
time       = "%H:%M"
label      = "%date%  %time%"
label-foreground = ${colors.fg-dim}

format-prefix    = "󰃰 "
format-prefix-foreground = ${colors.purple}

[module/tray]
type = internal/tray
