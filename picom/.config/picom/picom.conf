backend     = "glx";
vsync       = true;
glx-no-stencil = true;

# Shadows
shadow          = true;
shadow-radius   = 8;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity  = 0.6;
shadow-exclude  = [
    "name = 'Notification'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'i3-frame'",
    "class_g = 'polybar'"
];

# Fading
fading       = false;

# Opacity
inactive-opacity          = 0.92;
active-opacity            = 1.0;
frame-opacity             = 1.0;
inactive-opacity-override = false;
opacity-rule = [
    "100:class_g = 'kitty' && focused",
    "90:class_g = 'kitty' && !focused"
];

# Rounded corners
corner-radius = 6;
rounded-corners-exclude = [
    "class_g = 'polybar'",
    "class_g = 'i3-frame'"
];

# Misc
mark-wmwin-focused   = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
use-ewmh-active-win    = true;
